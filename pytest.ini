[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
markers =
    slow: 執行時間較長的測試
    integration: 需要外部服務的整合測試
    unit: 純邏輯單元測試
